          <a href="index.html#services" class="glow-btn inline-block bg-cyan text-night font-semibold px-8 py-4 rounded-xl">Открыть каталог</a>
        </section>`;
    } else {
      document.title = bot.title + ' — Botans free';

      const features = bot.features.map(f => `
        <li class="flex items-start gap-3">
          <svg class="w-5 h-5 mt-0.5 shrink-0" fill="none" stroke="#0b7285" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
          <span class="text-slate-700 text-sm sm:text-base leading-relaxed">${f}</span>
        </li>`).join('');

      // Если авторский бот готов (есть bot.demo) — кнопка, иначе «в разработке»
      const demoSection = bot.demo ? `
        <section class="mt-6 bg-white/95 border-2 border-cyan-dim/60 rounded-3xl p-7 sm:p-10 text-center shadow-[0_18px_60px_rgba(23,74,44,0.25)]">
          <h2 class="font-display font-bold text-xl sm:text-3xl mb-3">Проверьте его способности</h2>
          <p class="text-slate-600 mb-7 max-w-xl mx-auto">${bot.demoText}</p>
          <a href="${bot.demo}" target="_blank" rel="noopener"
             class="glow-btn inline-flex items-center gap-3 bg-cyan text-night font-semibold text-base sm:text-lg px-8 py-4 rounded-xl">
            <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor"><path d="M11.94 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zm4.64 6.8-1.63 7.68c-.12.55-.45.68-.9.42l-2.5-1.84-1.2 1.16c-.14.13-.25.24-.5.24l.17-2.52 4.6-4.15c.2-.18-.04-.28-.31-.1l-5.68 3.57-2.45-.76c-.53-.17-.54-.53.11-.79l9.57-3.69c.44-.16.83.11.72.78z"/></svg>
            Открыть демо-бота
          </a>
          <p class="text-slate-500 text-xs sm:text-sm mt-5">Авторский демо-бот · бесплатно, без регистрации</p>
          ${bot.news ? `<p class="text-slate-700 text-sm sm:text-base mt-6 pt-5 border-t border-slate-200">${bot.news}</p>` : ''}
        </section>` : `
        <section class="mt-6 bg-white/80 border-2 border-dashed border-cyan-dim/50 rounded-3xl p-7 sm:p-10 text-center shadow-[0_18px_60px_rgba(23,74,44,0.18)]">
          <h2 class="font-display font-bold text-xl sm:text-3xl mb-3">Проверьте его способности</h2>
          <p class="text-slate-600 max-w-xl mx-auto">Авторский бот в разработке...</p>
        </section>`;

      // Скриншоты реальной работы бота, если есть
      const examplesSection = bot.examples ? `
        <section class="mt-6 bg-white/95 border border-white/70 rounded-3xl p-7 sm:p-10 shadow-[0_18px_60px_rgba(23,74,44,0.25)]">
          <h2 class="font-display font-bold text-xl sm:text-3xl mb-3 text-center">Так может работать ваш бот</h2>
          <p class="text-slate-600 text-center max-w-xl mx-auto mb-7">${bot.examples.intro}</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 items-start">
            ${bot.examples.items.map(ex => `
            <figure class="bg-slate-50 border border-slate-200 rounded-2xl overflow-hidden">
              <img src="${ex.src}" alt="${ex.alt}" loading="lazy" class="w-full h-auto">
              <figcaption class="text-slate-600 text-sm leading-relaxed px-4 py-3">${ex.caption}</figcaption>
            </figure>`).join('')}
          </div>
        </section>` : '';

      page.innerHTML = `
        <!-- Карточка бота -->
        <section class="bg-white/95 border border-white/70 rounded-3xl p-7 sm:p-10 shadow-[0_18px_60px_rgba(23,74,44,0.25)]">
          <div class="flex items-center gap-4 mb-5">
            <div class="w-14 h-14 rounded-2xl bg-cyan/15 flex items-center justify-center shrink-0">
              <svg class="w-7 h-7" fill="none" stroke="#0b7285" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${bot.icon}</svg>
            </div>
            <h1 class="font-display font-bold text-2xl sm:text-4xl tracking-tight">${bot.title}${bot.hit ? ' <span class="align-middle ml-1 inline-block bg-cyan text-night text-xs font-bold px-3 py-1 rounded-full">Хит</span>' : ''}</h1>
          </div>
          <p class="text-slate-600 text-base sm:text-lg leading-relaxed mb-6">${bot.about}</p>

          <h2 class="font-display font-semibold text-xl sm:text-2xl mt-3 mb-4">Что умеет</h2>
          <ul class="space-y-3">${features}</ul>
          ${bot.forWhom ? `
          <h2 class="font-display font-semibold text-xl sm:text-2xl mt-9 mb-4">Кому подходит</h2>
          <div class="flex flex-wrap gap-2">${bot.forWhom.map(w => `<span class="bg-cyan/10 border border-cyan-dim/40 text-slate-700 text-sm rounded-full px-4 py-1.5">${w}</span>`).join('')}</div>` : ''}
        </section>

        <!-- Примеры работы -->
        ${examplesSection}

        <!-- Авторский демо-бот -->
        ${demoSection}

        <!-- Заказ -->
        <section class="mt-6 bg-white rounded-3xl rounded-bl-lg px-6 py-9 sm:px-10 sm:py-11 text-center shadow-[0_18px_60px_rgba(23,74,44,0.30)]">
          <h2 class="font-display font-bold text-xl sm:text-3xl mb-3">Нужен такой бот под вашу задачу?</h2>
          <p class="text-slate-600 mb-7">Напишите — обсудим сценарий, предложу вариант и назову цену.</p>
          <a href="${CONTACT_URL}" target="_blank" rel="noopener"
             class="glow-btn inline-flex items-center gap-3 bg-cyan text-night font-semibold px-8 py-4 rounded-xl">Обсудить проект</a>
        </section>

        <p class="text-center text-slate-800 text-sm mt-10">Любые ваши правки учтутся</p>
      `;
    }
  </script>

  <script src="assets/tg.js"></script>
</body>
</html>
